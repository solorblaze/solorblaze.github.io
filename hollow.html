<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hollow.guru</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1a1a2e 0%, #0d0d1a 50%, #050510 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }
        
        .cube {
            width: min(85vw, 420px);
            min-height: min(60vh, 500px);
            background: rgba(20, 20, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(100, 80, 180, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            z-index: 10;
            position: relative;
            padding: 35px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .server-header {
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 20px;
        }
        
        .server-icon {
            width: 70px;
            height: 70px;
            background: rgba(100, 80, 180, 0.2);
            border-radius: 16px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 1px solid rgba(100, 80, 180, 0.3);
        }
        
        .server-name {
            color: #e0e0ff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .server-ip {
            color: #8888aa;
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .info-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }
        
        .info-row:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(100, 80, 180, 0.2);
        }
        
        .info-label {
            color: #666688;
            font-size: 13px;
            font-weight: 400;
        }
        
        .info-value {
            color: #c0c0dd;
            font-size: 13px;
            font-weight: 600;
        }
        
        .status-online {
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .description {
            color: #8888aa;
            font-size: 13px;
            line-height: 1.6;
            text-align: center;
            padding: 10px 0;
        }
        
        .join-btn {
            background: rgba(100, 80, 180, 0.2);
            color: #b8b0e0;
            border: 1px solid rgba(100, 80, 180, 0.3);
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            margin-top: auto;
        }
        
        .join-btn:hover {
            background: rgba(100, 80, 180, 0.3);
            color: #e0d8ff;
            box-shadow: 0 0 20px rgba(100, 80, 180, 0.2);
        }
        
        .snowflake {
            position: absolute;
            top: -10px;
            background: rgba(200, 200, 255, 0.6);
            border-radius: 50%;
            animation: fall linear infinite;
            pointer-events: none;
        }
        
        @keyframes fall {
            to {
                transform: translateY(105vh);
            }
        }
    </style>
</head>
<body>
    <div class="cube">
        <div class="server-header">
            <div class="server-name">HOLLOW</div>
            <div class="server-ip">hollow.guru</div>
        </div>
        
        <div class="info-section">
            <div class="info-row">
                <span class="info-label">Статус</span>
                <span class="info-value status-online">
                    <span class="status-dot"></span>
                    Онлайн
                </span>
            </div>
            <div class="info-row">
                <span class="info-label">Версия</span>
                <span class="info-value">1.21.11</span>
            </div>
            <div class="info-row">
                <span class="info-label">Режим</span>
                <span class="info-value">Vanilla</span>
            </div>
            <div class="info-row">
                <span class="info-label">Слотов</span>
                <span class="info-value">до 100 игроков</span>
            </div>
            <div class="info-row">
                <span class="info-label">Платформа</span>
                <span class="info-value">Java Edition</span>
            </div>
        </div>
        
        <div class="description">
            Простой ванильный сервер. Без читов, без токсичности — чистый ванильный опыт. Строй, исследуй, выживай.
        </div>
        
        <div class="join-btn">Присоединиться</div>
    </div>
    
    <script>
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            
            const size = Math.random() * 4 + 1.5;
            snowflake.style.width = size + 'px';
            snowflake.style.height = size + 'px';
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = Math.random() * 4 + 3 + 's';
            snowflake.style.opacity = Math.random() * 0.4 + 0.2;
            
            document.body.appendChild(snowflake);
            
            setTimeout(() => {
                snowflake.remove();
            }, 7000);
        }
        
        setInterval(createSnowflake, 120);
    </script>
</body>
</html>
